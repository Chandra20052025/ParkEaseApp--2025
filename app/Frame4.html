<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Park Ease</title>
  <link rel="stylesheet" href="Frame4.css">
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="images/node-2.svg" alt="ParkEase Logo" class="logo">
      <h1>PARK EASE</h1>
    </div>
    <div class="icons">
      <button class="user-icon" id="user-btn" aria-label="User Info">
        <svg width="24" height="24" viewBox="0 0 24 24">
          <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12ZM12 14C8.13401 14 5 16.6863 5 20V21H19V20C19 16.6863 15.866 14 12 14Z" fill="black"/>
        </svg>
      </button>
      <button class="menu-icon" id="menu-btn" aria-label="Menu">☰</button>
      <div class="dropdown" id="dropdown-menu" role="menu" aria-hidden="true">
        <button onclick="location.href='edit.html'">Edit Profile</button>
        <button onclick="location.href='privacy.html'">Privacy Policy</button>
        <button onclick="location.href='aboutus.html'">About Us</button>
        <button onclick="location.href='faq.html'">Help & FAQ</button>
        <button id="logout" aria-haspopup="true">Log Out</button>
      </div>
      <div class="overlay" id="overlay" tabindex="-1"></div>
      <div class="user-info-box" id="user-info-box" role="dialog" aria-modal="true" aria-labelledby="user-info-label">
        <label id="user-info-label">User Name</label><input type="text" id="name" readonly />
        <label>Vehicle No</label><input type="text" id="vehicleNo" readonly />
        <label>Driving License No</label><input type="text" id="licenseNo" readonly />
        <label>Phone No</label><input type="text" id="mobile" readonly />
        <button class="close-btn" id="close-btn">Close</button>
      </div>
    </div>
  </header>

  <div class="request-overlay" id="request-overlay">
    <div class="request-modal">
      <h3>Request Parking Slot</h3>
      <div class="form-content">
        <div class="form-group">
          <label for="from-date">From Date:</label>
          <input type="date" id="from-date" required>
        </div>
        <div class="form-group">
          <label for="from-time">From Time:</label>
          <input type="time" id="from-time" required>
        </div>
        <div class="form-group">
          <label for="to-date">To Date:</label>
          <input type="date" id="to-date" required>
        </div>
        <div class="form-group">
          <label for="to-time">To Time:</label>
          <input type="time" id="to-time" required>
        </div>
        <div class="form-group">
          <label for="vehicle-type">Vehicle Type:</label>
          <select id="vehicle-type" required>
            <option value="" disabled selected>Select vehicle type</option>
            <option value="Car">Car</option>
            <option value="Bike">Bike</option>
          </select>
        </div>
        <div class="modal-buttons">
          <button class="cancel-btn" id="cancel-request">Cancel</button>
          <button class="request-btn" id="submit-request">Send Request</button>
        </div>
      </div>
    </div>
  </div>

  <div class="parking-container">
    <img src="images/car.jpg" alt="Parking Lot" />
    <div class="container">
      <div class="search-bar-container">
        <input type="text" class="search-input" placeholder="Search User">
        <button class="search-button" onclick="searchUser()">Search</button>
        <button class="clear-button" onclick="clearResults()">Clear</button>
      </div>
      <div id="user-details-table" class="search-results"></div>
    </div>
    <div class="friends-list-container">
      <h2>Friends List</h2>
    </div>
  </div>

  <div class="why-park">
    <h2>Why you should park with us?</h2>
    <div class="features">
      <div class="feature-button">📹 CCTV</div>
      <div class="feature-button">🔍 Vehicle Inspection</div>
      <div class="feature-button">🚧 Fenced</div>
      <div class="feature-button">🅿 Paved Surface</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, doc, getDoc, getDocs, addDoc, setDoc, query, where, onSnapshot, arrayUnion, arrayRemove, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBymgcR5e-JRvkARi2JTmo1_zNvD4JIWgU",
      authDomain: "parkease-52cd5.firebaseapp.com",
      projectId: "parkease-52cd5",
      storageBucket: "parkease-52cd5.firebasestorage.app",
      messagingSenderId: "771148281265",
      appId: "1:771148281265:web:56145356b5d02fa00bb990",
      measurementId: "G-GGDS554MBR"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let isLoggingOut = false;
    let currentUserId = null;
    let currentUserData = null;
    let usersData = [];
    let currentRequestFriend = null;

    async function logout() {
      try {
        isLoggingOut = true;
        await signOut(auth);
        alert("Logged out successfully!");
        window.location.href = 'Frame2.html';
      } catch (error) {
        console.error("Logout error:", error);
        alert("Failed to logout. Try again.");
        isLoggingOut = false;
      }
    }

    async function getUserData(userId) {
      const userDocSnap = await getDoc(doc(db, "Users", userId));
      return userDocSnap.exists() ? userDocSnap.data() : null;
    }

    function openRequestModal(friend) {
      currentRequestFriend = friend;
      document.getElementById('request-overlay').style.display = 'flex';
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('from-date').min = today;
      document.getElementById('to-date').min = today;
    }

    function closeRequestModal() {
      document.getElementById('request-overlay').style.display = 'none';
      currentRequestFriend = null;
      document.getElementById('from-date').value = '';
      document.getElementById('from-time').value = '';
      document.getElementById('to-date').value = '';
      document.getElementById('to-time').value = '';
      document.getElementById('vehicle-type').value = '';
    }

    function findUserIdByFriend(friend) {
      if (friend.id) return friend.id;
      const match = usersData.find(u => u.username === friend.username || u.email === friend.email);
      return match ? match.id : null;
    }

    async function submitRequest() {
      if (!currentRequestFriend || !currentUserId) return;

      const requestedUserId = findUserIdByFriend(currentRequestFriend);
      if (!requestedUserId) {
        alert('Could not find the user. Please try again.');
        return;
      }

      const fromDate = document.getElementById('from-date').value;
      const fromTime = document.getElementById('from-time').value;
      const toDate = document.getElementById('to-date').value;
      const toTime = document.getElementById('to-time').value;
      const vehicleType = document.getElementById('vehicle-type').value;

      if (!fromDate || !fromTime || !toDate || !toTime || !vehicleType) {
        alert('Please fill in all fields');
        return;
      }

      const fromDateTime = new Date(`${fromDate}T${fromTime}`);
      const toDateTime = new Date(`${toDate}T${toTime}`);

      if (fromDateTime < new Date()) { alert('Start time cannot be in the past'); return; }
      if (fromDateTime >= toDateTime) { alert('End time must be after start time'); return; }

      const submitBtn = document.getElementById('submit-request');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        await addDoc(collection(db, "ParkingRequests"), {
          requesterId: currentUserId,
          requesterName: currentUserData.name,
          requesterEmail: currentUserData.email,
          requestedUserId,
          requestedUserName: currentRequestFriend.username,
          fromDate, fromTime, toDate, toTime, vehicleType,
          status: 'pending',
          timestamp: serverTimestamp()
        });
        alert('Request sent successfully!');
        closeRequestModal();
      } catch (error) {
        console.error('Error sending request:', error);
        alert('Failed to send request. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Request';
      }
    }

    function searchUser() {
      const searchInput = document.querySelector(".search-input").value.trim().toLowerCase();
      const tableContainer = document.getElementById("user-details-table");
      tableContainer.innerHTML = "";

      if (!searchInput) { tableContainer.innerHTML = "<p>Please enter a name to search.</p>"; return; }
      if (usersData.length === 0) { tableContainer.innerHTML = "<p>User data is still loading. Please try again.</p>"; return; }

      const foundUser = usersData.find(user => user.username.toLowerCase().includes(searchInput));

      if (foundUser) {
        const isCurrentUser = foundUser.id === currentUserId;
        tableContainer.innerHTML = `
          <table class="user-info-table">
            <thead><tr><th>Username</th><th>Vehicle Number</th><th>Phone Number</th><th>Email</th></tr></thead>
            <tbody><tr>
              <td>${foundUser.username}</td><td>${foundUser.vehicleNo}</td>
              <td>${foundUser.mobile}</td><td>${foundUser.email}</td>
            </tr></tbody>
          </table>
          ${isCurrentUser ?
            '<p style="color:#666;font-style:italic;margin-top:10px;">You cannot add yourself as a friend.</p>' :
            '<button id="add-friend-btn">Add to Friends</button>'
          }
        `;
        if (!isCurrentUser) {
          document.getElementById("add-friend-btn").addEventListener("click", () => addToFriendsList(foundUser));
        }
      } else {
        tableContainer.innerHTML = "<p>No users found with that name.</p>";
      }
    }

    function clearResults() {
      document.querySelector(".search-input").value = "";
      document.getElementById("user-details-table").innerHTML = "";
    }

    function createFriendItem(friend) {
      const friendItem = document.createElement("div");
      friendItem.classList.add("friend-item");
      const nameSpan = document.createElement("span");
      nameSpan.textContent = friend.username;
      const buttonsContainer = document.createElement("div");
      buttonsContainer.classList.add("friend-buttons");
      const requestButton = document.createElement("button");
      requestButton.textContent = "Request";
      requestButton.classList.add("request-friend-btn");
      requestButton.addEventListener("click", () => openRequestModal(friend));
      const removeButton = document.createElement("button");
      removeButton.textContent = "Remove";
      removeButton.classList.add("remove-btn");
      removeButton.addEventListener("click", () => removeFromFriendsList(friend, friendItem));
      buttonsContainer.appendChild(requestButton);
      buttonsContainer.appendChild(removeButton);
      friendItem.appendChild(nameSpan);
      friendItem.appendChild(buttonsContainer);
      return friendItem;
    }

    async function addToFriendsList(user) {
      if (!currentUserId || user.id === currentUserId) { alert("You cannot add yourself!"); return; }
      const container = document.querySelector(".friends-list-container");
      const exists = Array.from(container.querySelectorAll(".friend-item")).some(item => item.querySelector("span")?.textContent === user.username);
      if (exists) { alert(`${user.username} is already in your friends list.`); return; }
      const friendData = { id: user.id, username: user.username, vehicleNo: user.vehicleNo, mobile: user.mobile, email: user.email };
      try {
        await setDoc(doc(db, "Users", currentUserId), { friends: arrayUnion(friendData) }, { merge: true });
        container.appendChild(createFriendItem(friendData));
        alert(`${user.username} added to friends!`);
      } catch (error) {
        console.error("Error adding friend:", error);
        alert("Failed to add friend.");
      }
    }

    async function removeFromFriendsList(user, friendItem) {
      if (!currentUserId) return;
      try {
        await setDoc(doc(db, "Users", currentUserId), {
          friends: arrayRemove({ id: user.id, username: user.username, vehicleNo: user.vehicleNo, mobile: user.mobile, email: user.email })
        }, { merge: true });
        friendItem.remove();
      } catch (error) {
        console.error("Error removing friend:", error);
      }
    }

    async function loadFriendsList() {
      if (!currentUserId) return;
      const docSnap = await getDoc(doc(db, "Users", currentUserId));
      const container = document.querySelector(".friends-list-container");
      container.innerHTML = "<h2>Friends List</h2>";
      if (docSnap.exists() && docSnap.data().friends?.length > 0) {
        docSnap.data().friends.forEach(friend => container.appendChild(createFriendItem(friend)));
      } else {
        const msg = document.createElement("p");
        msg.textContent = "No friends added yet.";
        container.appendChild(msg);
      }
    }

    async function fetchUsers() {
      const snapshot = await getDocs(collection(db, "Users"));
      usersData = [];
      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        usersData.push({ id: docSnap.id, username: data.name || "No Name", mobile: data.mobile || "", vehicleNo: data.vehicleNo || "", email: data.email || "" });
      });
    }

    document.addEventListener("DOMContentLoaded", function () {
      document.querySelector(".user-icon").addEventListener("click", () => {
        document.getElementById("user-info-box").style.display = "block";
        document.getElementById("overlay").style.display = "block";
      });
      document.getElementById("close-btn").addEventListener("click", () => {
        document.getElementById("user-info-box").style.display = "none";
        document.getElementById("overlay").style.display = "none";
      });
      document.getElementById("menu-btn").addEventListener("click", (event) => {
        const dd = document.getElementById("dropdown-menu");
        dd.style.display = dd.style.display === "block" ? "none" : "block";
        event.stopPropagation();
      });
      document.addEventListener("click", (event) => {
        const dd = document.getElementById("dropdown-menu");
        if (!dd.contains(event.target) && event.target.id !== "menu-btn") dd.style.display = "none";
      });
      document.getElementById("dropdown-menu").addEventListener("click", (e) => e.stopPropagation());
      document.getElementById('logout').addEventListener('click', logout);
      document.getElementById('cancel-request').addEventListener('click', closeRequestModal);
      document.getElementById('submit-request').addEventListener('click', submitRequest);
      document.getElementById('from-date').addEventListener('change', function () {
        document.getElementById('to-date').min = this.value;
      });
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUserId = user.uid;
        try {
          currentUserData = await getUserData(user.uid);
          if (currentUserData) {
            document.getElementById("name").value = currentUserData.name || "";
            document.getElementById("vehicleNo").value = currentUserData.vehicleNo || "";
            document.getElementById("licenseNo").value = currentUserData.licenseNo || "";
            document.getElementById("mobile").value = currentUserData.mobile || "";
          }
          await fetchUsers();
          await loadFriendsList();
        } catch (error) {
          console.error("Error initializing page:", error);
        }
      } else {
        if (!isLoggingOut) {
          alert("Please log in to access the app.");
          window.location.href = "Frame2.html";
        }
      }
    });

    window.searchUser = searchUser;
    window.clearResults = clearResults;
  </script>
</body>
</html>
