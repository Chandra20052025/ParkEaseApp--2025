<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Profile - ParkEase</title>
  <link rel="stylesheet" href="Frame8.css">
  <style>
    .edit-container {
      max-width: 460px;
      margin: 30px auto;
      background: white;
      padding: 35px 40px;
      border-radius: 15px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      text-align: left;
    }

    .edit-container h2 {
      text-align: center;
      color: #2ca7c9;
      margin-bottom: 25px;
      font-size: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #34495e;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
      background: white;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      border-color: #2ca7c9;
      outline: none;
      box-shadow: 0 0 0 3px rgba(44,167,201,0.15);
    }

    .save-btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background-color: #2ca7c9;
      border: none;
      color: white;
      font-weight: 600;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .save-btn:hover {
      background-color: #1b7a95;
    }

    .save-btn:disabled {
      background-color: #a0d8e8;
      cursor: not-allowed;
    }

    .cancel-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      color: #888;
      font-size: 14px;
      cursor: pointer;
      text-decoration: underline;
    }

    .cancel-link:hover {
      color: #555;
    }

    #error-msg {
      color: red;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    #success-msg {
      color: green;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { firebaseConfig } from './firebaseConfig.js';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const userDocRef = doc(db, "Users", user.uid);
        const userDocSnap = await getDoc(userDocRef);
        if (userDocSnap.exists()) {
          const data = userDocSnap.data();
          // FIX: fields correctly mapped
          document.getElementById("name").value = data.name || "";
          document.getElementById("vehicleNo").value = data.vehicleNo || "";
          document.getElementById("licenseNo").value = data.licenseNo || "";
          document.getElementById("mobile").value = data.mobile || "";
        }
      } else {
        alert("Please log in to edit your profile.");
        window.location.href = "Frame2.html";
      }
    });

    async function saveChanges() {
      const user = auth.currentUser;
      if (!user) return;

      const name = document.getElementById("name").value.trim();
      const vehicleNo = document.getElementById("vehicleNo").value.trim();
      const licenseNo = document.getElementById("licenseNo").value.trim();
      const mobile = document.getElementById("mobile").value.trim();
      const errorMsg = document.getElementById("error-msg");
      const successMsg = document.getElementById("success-msg");

      errorMsg.style.display = "none";
      successMsg.style.display = "none";

      if (!name || !vehicleNo || !licenseNo || !mobile) {
        errorMsg.textContent = "All fields are required.";
        errorMsg.style.display = "block";
        return;
      }

      const mobileRegex = /^[0-9]{10}$/;
      if (!mobileRegex.test(mobile)) {
        errorMsg.textContent = "Please enter a valid 10-digit mobile number.";
        errorMsg.style.display = "block";
        return;
      }

      const saveBtn = document.getElementById("saveBtn");
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving...";

      try {
        const userDocRef = doc(db, "Users", user.uid);
        await updateDoc(userDocRef, { name, vehicleNo, licenseNo, mobile });

        successMsg.textContent = "Profile updated successfully!";
        successMsg.style.display = "block";

        setTimeout(() => {
          window.location.href = "Frame3.html";
        }, 1200);
      } catch (error) {
        console.error("Error updating profile:", error);
        errorMsg.textContent = "Update failed: " + error.message;
        errorMsg.style.display = "block";
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "Save Changes";
      }
    }

    window.saveChanges = saveChanges;
  </script>
</head>
<body>
  <header>
    <div class="logo-container" onclick="location.href='Frame3.html'">
      <img src="images/node-2.svg" alt="ParkEase Logo" />
      <h1>ParkEase</h1>
    </div>
  </header>

  <main>
    <div class="edit-container">
      <h2>Edit Profile</h2>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required />
      </div>

      <div class="form-group">
        <label for="vehicleNo">Vehicle Number</label>
        <input type="text" id="vehicleNo" placeholder="e.g. MH12AB1234" required />
      </div>

      <div class="form-group">
        <label for="licenseNo">Driving License Number</label>
        <input type="text" id="licenseNo" placeholder="Enter your license number" required />
      </div>

      <div class="form-group">
        <label for="mobile">Mobile Number</label>
        <input type="tel" id="mobile" placeholder="10-digit mobile number" required />
      </div>

      <p id="error-msg"></p>
      <p id="success-msg"></p>

      <button class="save-btn" id="saveBtn" onclick="saveChanges()">Save Changes</button>
      <a class="cancel-link" onclick="location.href='Frame3.html'">Cancel</a>
    </div>
  </main>
</body>
</html>
